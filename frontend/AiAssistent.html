<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistent - Eco Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; }
        #chatInput, #chatMessages, .chat-output { user-select: text; -webkit-user-select: text; }
        .gold-text { color: #D4AF37; text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1); }
        .sidebar-btn { transition: all 0.2s ease-in-out; }
        .sidebar-btn:hover { background-color: #f3f4f6; transform: scale(1.05); }
        .chat-output p { margin-bottom: 6px; }
        .chat-output ul { list-style-type: disc; margin-left: 20px; }
        .chat-output table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
        .chat-output td, .chat-output th { border: 1px solid #e5e7eb; padding: 4px 8px; text-align: left; }
        .chat-output th { background: #f9fafb; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden">

    <aside class="w-28 bg-white border-r border-gray-200 flex flex-col items-center py-6 justify-between select-none z-10">
        <div class="flex flex-col items-center w-full space-y-8">
            <a href="./index.html"><div class="gold-text font-black text-2xl tracking-wider text-center px-2 leading-none cursor-pointer">Eco<br><span class="text-xl">Us</span></div></a>
            <nav class="flex flex-col items-center w-full space-y-6">
                <a href="./profil.html"><button class="sidebar-btn w-20 py-2 flex flex-col items-center justify-center rounded-xl text-gray-500 hover:text-gray-800"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg><span class="text-[11px] font-medium mt-1">Profil</span></button></a>
                <a href="./AiAssistent.html"><button class="sidebar-btn w-20 py-2 flex flex-col items-center justify-center rounded-xl text-indigo-600 bg-indigo-50 border border-indigo-100 font-semibold shadow-sm"><div class="w-8 h-8 rounded-full border-2 border-current flex items-center justify-center font-bold text-xs tracking-tighter">AI</div><span class="text-[11px] font-medium mt-1">AI Assistent</span></button></a>
                <a href="./bozor.html"><button class="sidebar-btn w-20 py-2 flex flex-col items-center justify-center rounded-xl text-gray-500 hover:text-emerald-600"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg><span class="text-[11px] font-medium mt-1">Bozor</span></button></a>
                <a href="./aksiyalar.html"><button class="sidebar-btn w-20 py-2 flex flex-col items-center justify-center rounded-xl text-gray-500 hover:text-amber-500"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" /></svg><span class="text-[11px] font-medium mt-1">Aksiyalar</span></button></a>
            </nav>
        </div>
        <button class="sidebar-btn p-3 rounded-full text-gray-400 hover:text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827a1.125 1.125 0 0 1 .26 1.43l-1.297 2.247a1.125 1.125 0 0 1-1.37.491l-1.216-.456c-.356-.133-.751-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /></svg></button>
    </aside>

    <main class="flex-1 flex flex-col bg-gray-50 overflow-hidden relative">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0">
            <div class="flex items-center space-x-3">
                <h2 class="font-bold text-base text-indigo-700">Eco Us AI Assistent</h2>
                <span id="dataStatus" class="text-xs bg-gray-100 text-gray-500 px-2.5 py-0.5 rounded-full">Ma'lumot yuklanmoqda...</span>
            </div>
            <button onclick="clearChat()" class="text-xs text-gray-400 hover:text-gray-600 bg-gray-50 hover:bg-gray-100 px-3 py-1.5 rounded-lg transition">Tozalash</button>
        </header>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50">
            <div class="flex items-start">
                <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-xs mr-3 flex-shrink-0">AI</div>
                <div class="bg-white p-3.5 rounded-2xl rounded-bl-none shadow-sm border border-gray-100 max-w-[80%] text-sm text-gray-800 chat-output">
                    Salom! Men Eco Us AI yordamchisiman. Saytdagi barcha ma'lumotlarni tahlil qila olaman:
                    <br><br>
                    📊 <strong>Bozor</strong> - kompaniyalar, tariflar, FAQ
                    <br>
                    🏷️ <strong>Aksiyalar</strong> - chegirma va aksiyalar
                    <br>
                    🌿 <strong>Eco Us</strong> - umumiy ma'lumot
                    <br><br>
                    <em>Menga savolingizni bering!</em>
                </div>
            </div>
        </div>

        <div class="border-t border-gray-200 bg-white p-4 flex-shrink-0">
            <div class="flex items-center space-x-2 p-1.5 bg-gray-50 border border-gray-200 rounded-full max-w-4xl mx-auto shadow-sm">
                <input type="text" id="chatInput" placeholder="Savolingizni yozing..." 
                    class="flex-grow p-2.5 px-4 bg-transparent border-none focus:outline-none focus:ring-0 text-gray-700 text-sm placeholder-gray-400 font-normal">
                <button onclick="sendMessage()" id="sendBtn" disabled
                    class="p-2.5 bg-gray-200 text-gray-400 rounded-full flex items-center justify-center transition-all duration-300 cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');
        const dataStatus = document.getElementById('dataStatus');

        let siteContext = '';

        async function loadSiteData() {
            let bozorData = null;
            try {
                const resp = await fetch('./parser/data/bozor_data.json');
                bozorData = await resp.json();
            } catch {
                bozorData = getFallbackData();
            }

            const promotions = getLocalPromotions();

            siteContext = buildContext(bozorData, promotions);
            dataStatus.textContent = 'Ma'lumot yuklandi';
            dataStatus.classList.remove('bg-gray-100', 'text-gray-500');
            dataStatus.classList.add('bg-emerald-100', 'text-emerald-700');
        }

        function getFallbackData() {
            return {
                site: { name: 'Bozor', description: 'Kompaniyalar va tariflar ma\'lumotlari', company: 'MULTIBROKER MChJ' },
                companies: [
                    { name: 'Agrobank', sector: 'Bank' }, { name: 'Kafolat', sector: 'Sug\'urta' },
                    { name: 'SQB', sector: 'Bank' }, { name: 'Ipak Yo\'li', sector: 'Bank' },
                    { name: 'UNG', sector: 'Neft va gaz' }, { name: 'UzEx', sector: 'Birja' },
                    { name: 'Qizilqum sement', sector: 'Qurilish' }, { name: 'Aloqa', sector: 'Telekommunikatsiya' }
                ],
                plans: [
                    { name: 'Investor', commissions: { stock_listed_buy_sell: '0.31%', broker_stock_listed: '0.63%', stamp_duty: '0.01%' } },
                    { name: 'Treyder', commissions: { stock_listed_buy_sell: '0.31%', broker_stock_listed: '1%', stamp_duty: '0.01%' } },
                    { name: 'Pro', commissions: { stock_listed_buy_sell: '0.31%', broker_stock_listed: '1%', stamp_duty: '0.01%' } }
                ],
                faq: [
                    { category: 'Fond bozori', questions: [
                        { q: 'Fond bozori nima?', a: 'Fond bozori - moliyaviy bozorning ajralmas qismi.' },
                        { q: 'O\'zbekistonda fond birjasi bormi?', a: 'Ha, Toshkent RFB 1994-yilda tashkil etilgan.' }
                    ]}
                ]
            };
        }

        function getLocalPromotions() {
            try { return JSON.parse(localStorage.getItem('eco_us_promotions')) || []; } catch { return []; }
        }

        function buildContext(bozor, promos) {
            let ctx = `Siz Eco Us tizimining AI yordamchisisiz. Foydalanuvchilarga quyidagi ma'lumotlar asosida yordam bering:\n\n`;

            ctx += `=== BOZOR MA'LUMOTLARI ===\n`;
            ctx += `Xizmat: ${bozor.site.name} - ${bozor.site.description}\n`;
            ctx += `Kompaniya: ${bozor.site.company}\n`;

            ctx += `\n--- Kompaniyalar (${(bozor.companies||[]).length} ta) ---\n`;
            (bozor.companies||[]).forEach(c => { ctx += `- ${c.name} (${c.sector})\n`; });

            ctx += `\n--- Tarif rejalari (${(bozor.plans||[]).length} ta) ---\n`;
            (bozor.plans||[]).forEach(p => {
                ctx += `- ${p.name}: Listing aksiyalar komissiyasi ${p.commissions.stock_listed_buy_sell || 'N/A'}, Broker komissiyasi ${p.commissions.broker_stock_listed || 'N/A'}\n`;
            });

            ctx += `\n--- FAQ (${(bozor.faq||[]).length} ta bo'lim) ---\n`;
            (bozor.faq||[]).forEach(cat => {
                ctx += `\n${cat.category}:\n`;
                (cat.questions||[]).forEach(q => { ctx += `  Savol: ${q.q}\n  Javob: ${q.a}\n`; });
            });

            ctx += `\n=== AKSIYALAR (${promos.length} ta) ===\n`;
            if (promos.length === 0) {
                ctx += `Hozircha aksiyalar mavjud emas.\n`;
            } else {
                promos.forEach(p => {
                    const statusMap = { active: 'Faol', expired: 'Tugagan', upcoming: 'Kutilmoqda' };
                    ctx += `- ${p.name} | Chegirma: ${p.discount || 0}% | Holati: ${statusMap[p.status] || p.status} | ${p.startDate || ''} - ${p.endDate || ''} | ${p.description || ''}\n`;
                });
            }

            ctx += `\n=== ECO US SAYTI ===\n`;
            ctx += `Eco Us - qishloq xo'jaligi va ekologiya sohasidagi loyihalar uchun dashboard. Sahifalar: Profil, AI Assistent, Bozor, Aksiyalar.\n`;

            ctx += `\n\nMUHIM:\n`;
            ctx += `- Savollarga faqat yuqoridagi ma'lumotlar asosida javob bering.\n`;
            ctx += `- Agar ma'lumot yetarli bo'lmasa, "Kechirasiz, bu haqida ma'lumot topilmadi" deb ayting.\n`;
            ctx += `- Javoblarni o'zbek tilida bering.\n`;
            ctx += `- Tahlil qilayotganda raqamlar va foizlarni aniq ko'rsating.\n`;
            ctx += `- Aksiyalarni tahlil qilishda ularning holati, chegirma foizi va muddatiga e'tibor bering.\n`;

            return ctx;
        }

        chatInput.addEventListener('input', () => {
            const val = chatInput.value.trim();
            if (val.length > 0) {
                sendBtn.disabled = false;
                sendBtn.classList.remove('bg-gray-200', 'text-gray-400', 'cursor-not-allowed');
                sendBtn.classList.add('bg-emerald-600', 'text-white', 'cursor-pointer');
            } else {
                sendBtn.disabled = true;
                sendBtn.classList.remove('bg-emerald-600', 'text-white', 'cursor-pointer');
                sendBtn.classList.add('bg-gray-200', 'text-gray-400', 'cursor-not-allowed');
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return;

            appendMessage('user', text);

            chatInput.value = '';
            sendBtn.disabled = true;
            sendBtn.classList.remove('bg-emerald-600', 'text-white', 'cursor-pointer');
            sendBtn.classList.add('bg-gray-200', 'text-gray-400', 'cursor-not-allowed');

            const loadId = appendMessage('ai', 'Tahlil qilmoqda...', true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        context: siteContext
                    })
                });

                const data = await response.json();
                document.getElementById(loadId)?.remove();

                if (data.reply) {
                    appendMessage('ai', data.reply);
                } else {
                    appendMessage('ai', data.error || 'Tizimda xatolik yuz berdi. Qayta urinib ko\'ring.');
                }
            } catch (err) {
                document.getElementById(loadId)?.remove();
                appendMessage('ai', 'Serverga ulanishda xatolik. Server ishlayotganiga ishonch hosil qiling.');
                console.error(err);
            }
        }

        function appendMessage(sender, msgText, isLoad = false) {
            const id = 'm-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'items-start'} fade-in`;

            const avatar = sender === 'ai' ? `<div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-xs mr-3 flex-shrink-0">AI</div>` : '';
            const bgClass = sender === 'user' ? 'bg-emerald-600 text-white rounded-2xl rounded-br-none' : 'bg-white text-gray-800 border border-gray-100 rounded-2xl rounded-bl-none';

            div.innerHTML = `
                ${avatar}
                <div class="${bgClass} p-3.5 shadow-sm max-w-[80%] text-sm chat-output">
                    ${isLoad ? '<span class="text-gray-400 animate-pulse">Tahlil qilmoqda...</span>' : msgText.replace(/\n/g, '<br>')}
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        function clearChat() {
            chatMessages.innerHTML = `
                <div class="flex items-start">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-xs mr-3 flex-shrink-0">AI</div>
                    <div class="bg-white p-3.5 rounded-2xl rounded-bl-none shadow-sm border border-gray-100 max-w-[80%] text-sm text-gray-800 chat-output">
                        Chat tozalandi. Yangi savol bering!
                    </div>
                </div>
            `;
        }

        const style = document.createElement('style');
        style.textContent = `.fade-in { animation: fadeIn 0.3s ease; } @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }`;
        document.head.appendChild(style);

        document.addEventListener('DOMContentLoaded', loadSiteData);
    </script>
</body>
</html>
