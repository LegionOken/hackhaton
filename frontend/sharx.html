<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart - Bozor Analitika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h2 id="chartTitle" class="text-xl font-bold text-gray-800 mb-4">Yuklanmoqda...</h2>
        <canvas id="stockChart" height="300"></canvas>
        <a href="./aksiyalar.html" class="mt-6 inline-block text-emerald-600 hover:text-emerald-700 font-medium text-sm">← Orqaga</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bankKey = params.get('bank');

        async function initChart() {
            try {
                const resp = await fetch('./parser/data/bozor_data.json');
                const data = await resp.json();
                const stock = data.stocks.find(s => s.key === bankKey);
                
                if (!stock) {
                    document.getElementById('chartTitle').textContent = "Ma'lumot topilmadi";
                    return;
                }

                document.getElementById('chartTitle').textContent = `Narxlar tarixi: ${stock.name}`;
                
                const labels = stock.history.map(h => h.time);
                const prices = stock.history.map(h => h.close);

                new Chart(document.getElementById('stockChart'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Narx (so\'m)',
                            data: prices,
                            borderColor: '#059669',
                            tension: 0.1,
                            fill: true,
                            backgroundColor: 'rgba(5, 150, 105, 0.1)'
                        }]
                    },
                    options: { responsive: true }
                });
            } catch (e) {
                console.error(e);
            }
        }
        initChart();
    </script>
</body>
</html>
