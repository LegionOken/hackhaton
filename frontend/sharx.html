* { margin: 0; padding: 0; box-sizing: border-box; }
body { user-select: none; -webkit-user-select: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
.gold-text { color: #b7b72e; text-shadow: 0px 2px 4px rgba(0,0,0,0.1); }
.sidebar-btn { transition: all 0.2s ease-in-out; }
.sidebar-btn:hover { background-color: #f3f4f6; transform: scale(1.05); }
.stat-card { transition: all 0.2s ease; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.1); }
#chart { width: 100%; height: 380px; cursor: crosshair; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.flash-up { animation: flashGreen 0.5s ease; }
.flash-down { animation: flashRed 0.5s ease; }
@keyframes flashGreen { 0% { background: rgba(22,163,74,0.15); } 100% { background: transparent; } }
@keyframes flashDown { 0% { background: rgba(220,38,38,0.15); } 100% { background: transparent; } }

<!-- Main -->
<main class="flex-1 flex flex-col overflow-hidden">

    </div>
    <div class="flex items-center space-x-2">
      <select id="companySelect" onchange="switchCompany(this.value)" class="text-sm border border-gray-200 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-300"></select>

  </header>

  <div class="flex-1 overflow-y-auto p-6">
    <!-- Stats grid -->
    <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5 fade-in">

        <p class="text-xs text-gray-400 font-medium">Oxirgi narx</p>
        <p id="lastPrice" class="text-xl font-bold text-gray-800">--</p>
      </div>
      <div class="stat-card bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs text-gray-400 font-medium">Kunlik o'zgarish</p>
        <p id="changeAmount" class="text-xl font-bold text-gray-800">--</p>
      </div>
      <div class="stat-card bg-white rounded-xl border border-gray-100 shadow-sm p-4">

          <span id="chartTooltip" class="text-xs text-gray-400 bg-gray-50 px-2 py-1 rounded"></span>
          <select id="rangeSelect" onchange="drawChart()" class="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white focus:outline-none">
            <option value="1M">1 oy</option>
            <option value="3M" selected>3 oy</option>

    <!-- Extra info -->

      <h2 class="font-bold text-gray-800 text-sm mb-2">Qo'shimcha ma'lumotlar</h2>
      <div id="extraInfo" class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm"></div>
    </div>

<script>
let allData = { stocks: [] };
let currentStock = null;
let chartData = [];

function seededHash(seed, min, max) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) { h = ((h << 5) - h) + seed.charCodeAt(i); h |= 0; }
  return min + (Math.abs(h) / 0x7FFFFFFF) * (max - min);
}

function formatPrice(v) { return Number(v).toLocaleString() + " so'm"; }

async function loadData() {
  try {
    const resp = await fetch("./parser/data/bozor_data.json");
    allData = await resp.json();
  } catch (e) {
    allData = { stocks: [] };
  }
  const sel = document.getElementById("companySelect");
  sel.innerHTML = allData.stocks.map(s =>
    `<option value="${s.key}">${s.name} (${s.ticker})</option>`
  ).join("");
  const key = new URLSearchParams(window.location.search).get("company") || (allData.stocks[0] || {}).key || "";
  if (key) switchCompany(key);
}

function switchCompany(key) {
  currentStock = allData.stocks.find(s => s.key === key);
  if (!currentStock) return;
  history.replaceState(null, "", "?company=" + key);
  renderStock();
}

function renderStock() {
  const s = currentStock;
  if (!s) return;
  const isUp = s.change >= 0;
  document.getElementById("companyName").textContent = s.name;
  document.getElementById("companyTicker").textContent = s.ticker;

  const priceEl = document.getElementById("lastPrice");
  priceEl.textContent = formatPrice(s.price);
  priceEl.classList.remove("flash-up", "flash-down");
  void priceEl.offsetWidth;
  priceEl.classList.add(isUp ? "flash-up" : "flash-down");

  document.getElementById("changeAmount").innerHTML = (isUp ? "+" : "") + s.change.toFixed(2) + " <span class='text-xs font-normal'>(" + (isUp ? "+" : "") + s.changePercent.toFixed(2) + "%)</span>";
  document.getElementById("changeAmount").className = "text-xl font-bold " + (isUp ? "text-green-600" : "text-red-600");

  document.getElementById("highPrice").textContent = formatPrice(s.high);
  document.getElementById("volumeInfo").textContent = (s.avgVolume || 0).toLocaleString();

  const badge = document.getElementById("priceNav");
  badge.textContent = (isUp ? "+" : "") + s.changePercent.toFixed(2) + "%";
  badge.className = "text-sm font-semibold px-2.5 py-0.5 rounded-full " + (isUp ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700");

  document.getElementById("companySelect").value = s.key;

  const extra = document.getElementById("extraInfo");
  extra.innerHTML =
    '<div class="bg-gray-50 rounded-lg p-3"><p class="text-gray-400 text-xs">Ochilish</p><p class="font-semibold text-gray-800">' + formatPrice(s.open) + '</p></div>' +
    '<div class="bg-gray-50 rounded-lg p-3"><p class="text-gray-400 text-xs">Yopilish (old)</p><p class="font-semibold text-gray-800">' + formatPrice(s.prevClose) + '</p></div>' +
    '<div class="bg-gray-50 rounded-lg p-3"><p class="text-gray-400 text-xs">Yillik o\'zgarish</p><p class="font-semibold ' + (s.changeYear >= 0 ? 'text-green-600' : 'text-red-600') + '">' + (s.changeYear >= 0 ? "+" : "") + s.changeYearPercent.toFixed(2) + '%</p></div>' +
    '<div class="bg-gray-50 rounded-lg p-3"><p class="text-gray-400 text-xs">Hajm (bugun)</p><p class="font-semibold text-gray-800">' + (s.volume || 0).toLocaleString() + '</p></div>';

  // Generate fake chart data from the stock's base price
  generateFakeData(s);
  drawChart();
}

function generateFakeData(s) {
  const base = s.open || s.price;
  chartData = [];
  const count = 63;
  const driftBase = seededHash(s.key + "_drift", -0.0003, 0.0008);
  let price = base - base * seededHash(s.key + "_start", 0.03, 0.08);
  for (let i = 0; i < count; i++) {
    const r = seededHash(s.key + "_d" + i, -1, 1);
    const drift = price * driftBase + price * 0.003 * r;
    const open = price;
    const close = Math.max(price + drift, base * 0.1);
    const high = Math.max(open, close) * (1 + Math.abs(r) * 0.002);
    const low = Math.min(open, close) * (1 - Math.abs(r) * 0.002);
    price = close;
    const vol = Math.round(50000 + seededHash(s.key + "_v" + i, 0, 1) * 300000);
    chartData.push({ time: i, open, high, low, close, volume: vol });
  }
}

function drawChart() {
  const canvas = document.getElementById("chart");
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = (rect.width - 32) * dpr;
  canvas.height = 380 * dpr;
  canvas.style.width = (rect.width - 32) + "px";
  canvas.style.height = "380px";

  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  const range = document.getElementById("rangeSelect").value;
  const slice = { "1M": 22, "3M": 63, "6M": 130, "1Y": 260 }[range] || 63;
  const data = chartData.slice(-slice);
  if (data.length < 2) return;

  // Find min/max
  let minP = Infinity, maxP = -Infinity, maxV = 0;
  data.forEach(d => { if (d.low < minP) minP = d.low; if (d.high > maxP) maxP = d.high; if (d.volume > maxV) maxV = d.volume; });
  const pad = (maxP - minP) * 0.1;
  minP -= pad; maxP += pad;

  const padLeft = 60 * dpr, padRight = 10 * dpr, padTop = 10 * dpr, padBottom = 50 * dpr;
  const chartW = W - padLeft - padRight;
  const chartH = H - padTop - padBottom;
  const scaleX = chartW / (data.length - 1);
  const scaleY = chartH / (maxP - minP);

  function x(i) { return padLeft + i * scaleX; }
  function y(v) { return padTop + chartH - (v - minP) * scaleY; }

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = "#f3f4f6";
  ctx.lineWidth = 1;
  ctx.setLineDash([4 * dpr, 4 * dpr]);
  const gridLines = 5;
  for (let i = 0; i <= gridLines; i++) {
    const yy = padTop + (chartH / gridLines) * i;
    ctx.beginPath(); ctx.moveTo(padLeft, yy); ctx.lineTo(W - padRight, yy); ctx.stroke();
    const val = maxP - (maxP - minP) * (i / gridLines);
    ctx.setLineDash([]);
    ctx.fillStyle = "#9ca3af";
    ctx.font = (11 * dpr) + "px sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(val.toLocaleString(undefined, {maximumFractionDigits:0}), padLeft - 6 * dpr, yy + 4 * dpr);
    ctx.setLineDash([4 * dpr, 4 * dpr]);
  }
  ctx.setLineDash([]);

  // X-axis labels
  ctx.fillStyle = "#9ca3af";
  ctx.font = (10 * dpr) + "px sans-serif";
  ctx.textAlign = "center";
  const labelCount = Math.min(6, data.length);
  const step = Math.max(1, Math.floor(data.length / (labelCount - 1)));
  for (let i = 0; i < data.length; i += step) {
    const label = (i + 1) + "k";
    ctx.fillText(label, x(i), H - padBottom * 0.25);
  }

  // Draw candlesticks
  const candleWidth = Math.max(2 * dpr, Math.min(6 * dpr, scaleX * 0.6));
  data.forEach((d, i) => {
    const cx = x(i);
    const isUp = d.close >= d.open;
    ctx.fillStyle = isUp ? "#16a34a" : "#dc2626";
    ctx.strokeStyle = isUp ? "#16a34a" : "#dc2626";
    ctx.lineWidth = 1 * dpr;

    // Wick
    ctx.beginPath();
    ctx.moveTo(cx, y(d.high));
    ctx.lineTo(cx, y(d.low));
    ctx.stroke();

    // Body
    const top = Math.min(d.open, d.close);
    const bot = Math.max(d.open, d.close);
    const bodyH = Math.max(1 * dpr, (y(top) - y(bot)));
    ctx.fillRect(cx - candleWidth / 2, y(top), candleWidth, bodyH);
  });

  // Volume bars
  data.forEach((d, i) => {
    const cx = x(i);
    const isUp = d.close >= d.open;
    ctx.fillStyle = isUp ? "rgba(22,163,74,0.15)" : "rgba(220,38,38,0.15)";
    const vh = (d.volume / maxV) * (padBottom * 0.55);
    ctx.fillRect(cx - candleWidth / 2, H - padBottom + 5 * dpr, candleWidth, -vh);
  });

  // Draw tooltip on hover
  canvas.onmousemove = function(e) {
    const rect2 = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect2.left) / rect2.width * canvas.width;
    const idx = Math.round((mx - padLeft) / scaleX);
    if (idx < 0 || idx >= data.length) {
      document.getElementById("chartTooltip").textContent = "";
      return;
    }
    const d = data[idx];
    document.getElementById("chartTooltip").textContent =
      "O:" + d.open.toFixed(0) + " H:" + d.high.toFixed(0) + " L:" + d.low.toFixed(0) + " C:" + d.close.toFixed(0) + " | V:" + d.volume.toLocaleString();
  };
  canvas.onmouseleave = function() { document.getElementById("chartTooltip").textContent = ""; };
}

document.addEventListener("DOMContentLoaded", loadData);
window.addEventListener("resize", function() { if (chartData.length) drawChart(); });
</script>
</body>
