<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitra Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <style>
        :root {
            --sidebar-bg: #ffffff;
            --sidebar-hover: #f3f4f6;
            --sidebar-active: #0d9488;
            --sidebar-text: #6b7280;
            --sidebar-text-active: #111827;
        }
        .dark {
            --sidebar-bg: #080e1a;
            --sidebar-hover: #111d33;
            --sidebar-active: #14b8a6;
            --sidebar-text: #475569;
            --sidebar-text-active: #f1f5f9;
        }
        .gold-text { color: #eab308; text-shadow: 0px 2px 4px rgba(0,0,0,0.1); }
        .dark .gold-text { color: #facc15; text-shadow: 0px 2px 8px rgba(250,204,21,0.3); }
        .layout-sidebar { background: var(--sidebar-bg); }
        .nav-item {
            color: var(--sidebar-text);
            transition: all 0.2s ease;
            position: relative;
        }
        .nav-item:hover {
            color: var(--sidebar-text-active);
            background: var(--sidebar-hover);
        }
        .nav-item.active {
            color: var(--sidebar-text-active);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--sidebar-active);
            border-radius: 0 3px 3px 0;
            box-shadow: 0 0 8px var(--sidebar-active);
        }
        .theme-icon-wrapper {
            position: relative;
            width: 20px; height: 20px;
            flex-shrink: 0;
        }
        .theme-icon-wrapper svg {
            position: absolute;
            inset: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .sun-icon { opacity: 1; transform: rotate(0deg) scale(1); }
        .moon-icon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        .dark .sun-icon { opacity: 0; transform: rotate(90deg) scale(0.5); }
        .dark .moon-icon { opacity: 1; transform: rotate(0deg) scale(1); }
        .theme-toggle-btn .theme-icon-wrapper svg {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }
        .theme-toggle-btn.spinning .theme-icon-wrapper svg {
            animation: theme-spin 0.5s ease;
        }
        @keyframes theme-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.3); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .sidebar-wrapper { flex-shrink: 0; position: relative; z-index: 20; }
        .sidebar-wrapper::after {
            content: '';
            position: absolute;
            left: 56px;
            top: 0;
            width: 40px;
            height: 100%;
        }
        .sidebar-text-label {
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .sidebar-collapsed .sidebar-text-label {
            opacity: 0;
            visibility: hidden;
            transition-delay: 0s;
        }
        .sidebar-expanded .sidebar-text-label {
            opacity: 1;
            visibility: visible;
            transition-delay: 0.05s;
        }
        .sidebar-collapsed { width: 56px !important; }
        .sidebar-expanded { width: 200px !important; }
        .nav-icon, .theme-icon-wrapper, #settingsPanel .theme-icon-wrapper { pointer-events: none; }
        .sidebar-collapsed .sidebar-collapsed-show { display: block !important; }
        .sidebar-collapsed .logo-dark { display: none !important; }
        .dark .sidebar-collapsed .logo-light { display: none !important; }
        .dark .sidebar-collapsed .logo-dark { display: block !important; }
        #settingsPanel {
            position: fixed;
            width: 140px;
            z-index: 100;
            border-radius: 8px;
            padding: 8px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-subtle, #e2e8f0);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .lang-btn {
            flex: 1;
            padding: 4px 0;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--sidebar-text);
            background: transparent;
            border: none;
        }
        .lang-btn:hover { background: var(--sidebar-hover); }
        .lang-btn.active { background: var(--sidebar-active); color: #fff; }
        .scroll-thin::-webkit-scrollbar { width: 3px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
        .scroll-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 2px; }
        .scroll-thin::-webkit-scrollbar-track { background: transparent; }
        body { overflow: hidden; background: var(--sidebar-bg); font-family: sans-serif; }
    </style>
</head>
<body class="flex h-screen">

    <div class="sidebar-wrapper" id="sidebarWrapper">
    <aside id="sidebar" class="layout-sidebar flex flex-col items-center py-4 select-none z-20 sidebar-collapsed transition-all duration-300 overflow-hidden">
        <div class="flex flex-col items-center w-full h-full">
            <a href="./index.html" class="gold-text font-black text-xl tracking-wider text-center px-3 leading-none cursor-pointer mb-6 flex-shrink-0 no-underline" style="text-decoration:none;">
                <span class="sidebar-text-label">Arbitra</span>
                <img src="../logo_fixed.jpg" class="hidden sidebar-collapsed-show logo-light" style="width:32px;height:32px;object-fit:contain;margin:0 auto;">
                <img src="../logo_night.jpg" class="hidden sidebar-collapsed-show logo-dark" style="width:32px;height:32px;object-fit:contain;margin:0 auto;">
            </a>
            <nav class="flex flex-col w-full flex-1 overflow-y-auto scroll-thin px-2 space-y-1" style="background:inherit;">
                <a href="./aksiyalar.html" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm">
                    <svg class="w-5 h-5 flex-shrink-0 nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 0 0-2.455 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z"/></svg>
                    <span class="sidebar-text-label">Aksiyalar</span>
                </a>
                <a href="./AiAssistent.html" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm">
                    <div class="w-5 h-5 flex-shrink-0 rounded-full border-2 border-current flex items-center justify-center font-bold text-[9px] tracking-tighter">AI</div>
                    <span class="sidebar-text-label">AI Assistent</span>
                </a>
                <a href="./profil.html" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm">
                    <svg class="w-5 h-5 flex-shrink-0 nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
                    <span class="sidebar-text-label">Profil</span>
                </a>
            </nav>
            <div class="mt-auto pt-2 px-2 w-full space-y-1 flex-shrink-0">
                <button id="settingsBtn" onclick="toggleSettings()" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm w-full">
                    <svg class="w-5 h-5 flex-shrink-0 nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 0 1 0 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281Z"/></svg>
                    <span class="sidebar-text-label">Sozlamalar</span>
                </button>
            </div>
        </div>
    </aside>
    </div>

    <!-- Settings Popup -->
    <div id="settingsPanel" class="hidden">
        <button onclick="toggleDarkMode(document.getElementById('settingsPanel').querySelector('.theme-toggle-btn'))" class="theme-toggle-btn flex items-center justify-center w-full px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800" style="background:transparent;border:none;cursor:pointer;color:var(--sidebar-text);">
            <span class="theme-icon-wrapper" style="position:relative;width:20px;height:20px;flex-shrink:0;">
                <svg class="w-5 h-5 sun-icon" style="position:absolute;inset:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
                <svg class="w-5 h-5 moon-icon" style="position:absolute;inset:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
            </span>
        </button>
        <div class="flex justify-center space-x-1 mt-2">
            <button onclick="setLang('en')" class="lang-btn" data-lang="en">EN</button>
            <button onclick="setLang('ru')" class="lang-btn" data-lang="ru">RU</button>
            <button onclick="setLang('uz')" class="lang-btn" data-lang="uz">UZ</button>
        </div>
    </div>

    <main class="flex-1 flex flex-col justify-between bg-gray-50">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-end px-8">
            <button onclick="openLogin()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-5 py-2 rounded-lg transition shadow-sm">
                Kirish
            </button>
        </header>

        <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 mb-4 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-gray-800 mb-1">Avtorizatsiya zarur</h1>
            <p class="text-sm text-gray-500 max-w-sm">Ushbu sahifadagi ma'lumotlarni ko'rish uchun tizimga kiring.</p>
        </div>

        <footer class="h-12 bg-white border-t border-gray-100 flex items-center justify-center text-xs text-gray-400">
            &copy; 2026 Arbitra. Barcha huquqlar himoyalangan.
        </footer>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 z-50 hidden items-center justify-center" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);">
        <div class="bg-white rounded-2xl shadow-xl p-6 w-80" style="background: var(--panel-bg, #fff);">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100">Kirish</h2>
                <button onclick="closeLogin()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="space-y-3">
                <input type="text" placeholder="Login" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <input type="password" placeholder="Parol" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm py-2 rounded-lg transition">Kirish</button>
            </div>
        </div>
    </div>

<script>
if (localStorage.getItem('darkMode') === 'true') {
    document.documentElement.classList.add('dark');
}
function toggleDarkMode(btn) {
    btn.classList.add('spinning');
    setTimeout(() => btn.classList.remove('spinning'), 500);
    const html = document.documentElement;
    html.classList.toggle('dark');
    localStorage.setItem('darkMode', html.classList.contains('dark'));
}
function openLogin() {
    document.getElementById('loginModal').classList.remove('hidden');
    document.getElementById('loginModal').classList.add('flex');
}
function closeLogin() {
    document.getElementById('loginModal').classList.add('hidden');
    document.getElementById('loginModal').classList.remove('flex');
}
window.addEventListener('click', function(e) {
    const modal = document.getElementById('loginModal');
    if (e.target === modal) closeLogin();
});

document.addEventListener('DOMContentLoaded', function() {
    initSidebarHover();
});

function initSidebarHover() {
    const wrapper = document.getElementById('sidebarWrapper');
    const sidebar = document.getElementById('sidebar');
    wrapper.addEventListener('mouseenter', function() {
        sidebar.classList.remove('sidebar-collapsed');
        sidebar.classList.add('sidebar-expanded');
    });
    wrapper.addEventListener('mouseleave', function() {
        sidebar.classList.remove('sidebar-expanded');
        sidebar.classList.add('sidebar-collapsed');
        document.getElementById('settingsPanel').classList.add('hidden');
    });
}

function toggleSettings() {
    const panel = document.getElementById('settingsPanel');
    const btn = document.getElementById('settingsBtn');
    if (panel.classList.contains('hidden')) {
        const rect = btn.getBoundingClientRect();
        panel.style.top = (rect.top - 10) + 'px';
        panel.style.left = (rect.right + 6) + 'px';
        panel.classList.remove('hidden');
    } else {
        panel.classList.add('hidden');
    }
}

const savedLang = localStorage.getItem('lang') || 'uz';
function setLang(code) {
    localStorage.setItem('lang', code);
    document.querySelectorAll('#settingsPanel .lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === code);
    });
}
document.addEventListener('DOMContentLoaded', function() {
    setLang(savedLang);
});

document.addEventListener('click', function(e) {
    const panel = document.getElementById('settingsPanel');
    const btn = document.getElementById('settingsBtn');
    if (!panel.classList.contains('hidden') && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.add('hidden');
    }
});
</script>
</body>
</html>
